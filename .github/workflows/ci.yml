name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ping:
    name: Runner ping (diagnostic)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Echo runner info
        run: |
          echo "Runner OS:    $RUNNER_OS"
          echo "Runner arch:  $RUNNER_ARCH"
          echo "Runner name:  $RUNNER_NAME"
          uname -a
          date -u

  build:
    name: Build & Smoke Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax check (byte-compile all sources)
        run: python -m compileall -q .

      - name: Run unit tests (pytest, offline / mock mode)
        run: python -m pytest -q

      - name: Generate master portfolio PDF
        run: python create_portfolio.py

      - name: Run pipeline smoke test (mock mode)
        run: python main.py --mock

      - name: Verify expected artifacts were produced
        run: |
          set -e
          for f in output/job_analysis.json output/fit_evaluation.json \
                   output/tailored_resume.tex output/cover_letter.md \
                   output/interview_prep.md; do
            if [ ! -s "$f" ]; then
              echo "::error::Expected output artifact missing or empty: $f"
              exit 1
            fi
            echo "Found artifact: $f"
          done

      - name: Install Tectonic (LaTeX compiler)
        if: matrix.python-version == '3.12'
        run: |
          set -e
          curl -fsSL https://drop-sh.fullyjustified.net/x86_64-unknown-linux-musl/install.sh | sh
          sudo mv tectonic /usr/local/bin/tectonic
          tectonic --version

      - name: Compile tailored LaTeX resume to PDF
        if: matrix.python-version == '3.12'
        run: |
          set -e
          tectonic --keep-logs --outdir output output/tailored_resume.tex
          test -s output/tailored_resume.pdf
          echo "Successfully compiled tailored_resume.tex -> tailored_resume.pdf"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-py${{ matrix.python-version }}
          path: output/
          if-no-files-found: ignore
