services:
  app:
    build: .
    image: agenticjob:latest
    ports:
      - "8000:8000"
    # `.env` is git-ignored and absent on a fresh clone. Mark it optional so
    # `docker compose up` still boots (in mock mode) without it; Compose would
    # otherwise abort with "env file .env not found". Requires Compose v2.24+.
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
